<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Configurações para o site funcionar bem em celulares e computadores -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolas | Portfólio Profissional</title>
    
    <!-- Ícone que aparece na aba lá em cima -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/ffffff/code.png">
    
    <!-- Fontes que deixam o texto com cara de site moderno e profissional -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Biblioteca de ícones (GitHub, LinkedIn, etc ) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Biblioteca que faz as coisas "voarem" para a tela quando você desce a página -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* Definindo as cores do site: Roxo, Rosa e o fundo Escuro */
        :root { 
            --primary: #7c3aed; 
            --secondary: #db2777; 
            --dark: #020617; 
            --glass: rgba(255, 255, 255, 0.03 ); 
            --glass-border: rgba(255, 255, 255, 0.08); 
        }

        /* Tira as margens chatas que o navegador coloca sozinho */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Estilo do fundo e da letra do site inteiro */
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            color: white; 
            overflow-x: hidden; 
        }

        /* O gradiente colorido que fica se mexendo lá no fundo */
        .bg-gradient { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(45deg, #020617, #0f172a, #1e1b4b, #020617); 
            background-size: 400% 400%; 
            z-index: -2; 
            animation: gradientBG 15s ease infinite; 
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* As bolas coloridas e borradas que ficam flutuando */
        .circle { 
            position: fixed; 
            border-radius: 50%; 
            filter: blur(100px); 
            opacity: 0.2; 
            z-index: -1; 
            animation: float 20s infinite alternate; 
        }
        .c1 { width: 500px; height: 500px; top: -10%; left: -10%; background: var(--primary); }
        .c2 { width: 400px; height: 400px; bottom: -10%; right: -10%; background: var(--secondary); }

        @keyframes float { 
            0% { transform: translate(0, 0) scale(1); } 
            100% { transform: translate(100px, 50px) scale(1.1); } 
        }

        /* Menu do topo (Barra de navegação) */
        header { 
            padding: 2rem 0; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--glass-border); 
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        nav { display: flex; justify-content: space-between; align-items: center; }

        /* Estilo do nome NICOLAS no topo */
        .logo a { 
            font-family: 'Sora', sans-serif; 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: white; 
            text-decoration: none; 
        }
        .logo span { color: var(--primary); }

        /* Links do menu (Início, Sobre, etc) */
        .nav-links { display: flex; list-style: none; gap: 2.5rem; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--primary); }

        /* Seção principal (Hero) com seu nome e foto */
        .hero { height: 100vh; display: flex; align-items: center; gap: 4rem; padding-top: 80px; }
        .hero-content { flex: 1.2; }

        /* Títulos grandes e chamativos */
        .name { 
            font-size: 4.5rem; 
            font-family: 'Sora', sans-serif; 
            font-weight: 800; 
            line-height: 1.1; 
            margin-bottom: 1.5rem; 
            background: linear-gradient(to right, #fff, #94a3b8); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Botões de ação (Ver Projetos e Contato) */
        .hero-btns { display: flex; gap: 1.5rem; margin-bottom: 3rem; }
        .btn { padding: 1rem 2.5rem; border-radius: 12px; text-decoration: none; font-weight: 600; transition: 0.4s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3); }
        .btn-secondary { border: 1px solid var(--glass-border); background: var(--glass); color: white; backdrop-filter: blur(10px); }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* Estilo da sua foto profissional */
        .image-wrapper { 
            width: 420px; 
            height: 520px; 
            border-radius: 40px; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
        }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Ajustes para o site não quebrar no celular */
        @media (max-width: 992px) { 
            .hero { flex-direction: column; text-align: center; height: auto; padding: 150px 0 100px; } 
            .name { font-size: 3rem; } 
            .hero-btns { justify-content: center; } 
            .image-wrapper { width: 320px; height: 400px; } 
        }
    </style>
</head>
<body>
    <!-- Elementos do fundo animado -->
    <div class="bg-gradient"></div>
    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <!-- Barra de navegação -->
    <header>
        <nav class="container">
            <div class="logo"><a href="index.html">NICOLAS<span>.</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="contatos.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo da página inicial -->
    <main>
        <section class="hero container">
            <div class="hero-content" data-aos="fade-right">
                <p style="color: var(--primary); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 1rem;">Desenvolvedor & Designer</p>
                <h1 class="name">Nicolas Rodrigues</h1>
                <p style="font-size: 1.5rem; margin-bottom: 1.5rem; color: #cbd5e1;">Transformando código em arte digital.</p>
                <p style="margin-bottom: 3rem; color: #94a3b8; font-size: 1.1rem; max-width: 550px;">Especialista em criar interfaces modernas e sistemas de alta performance.</p>
                
                <div class="hero-btns">
                    <a href="projetos.html" class="btn btn-primary">Ver Projetos</a>
                    <a href="contatos.html" class="btn btn-secondary">Contato</a>
                </div>

                <!-- Ícones das suas redes sociais -->
                <div style="display: flex; gap: 1.5rem;">
                    <a href="https://github.com/" target="_blank" style="color: white; font-size: 1.4rem; opacity: 0.5; transition: 0.3s;"><i class="fab fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/nicolas-rodrigues-4a1564402/" target="_blank" style="color: white; font-size: 1.4rem; opacity: 0.5; transition: 0.3s;"><i class="fab fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/" target="_blank" style="color: white; font-size: 1.4rem; opacity: 0.5; transition: 0.3s;"><i class="fab fa-instagram"></i></a>
                </div>
            </div>

            <!-- Sua foto profissional -->
            <div class="hero-image" data-aos="zoom-in">
                <div class="image-wrapper">
                    <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663192268226/XSVfkzPDtXlLiqlV.png" alt="Nicolas Rodrigues">
                </div>
            </div>
        </section>
    </main>

    <!-- Ativa as animações -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true, duration: 1000 } );</script>
</body>
</html>
